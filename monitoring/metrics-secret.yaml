---
# ExternalSecret: prometheus-metrics-token
#
# Pulls the SAME METRICS_SECRET value the backend already validates
# against, from the same AWS Secrets Manager secret
# (penwave/prod/app-secrets) via the same ClusterSecretStore used in the
# penwave namespace. ClusterSecretStore is cluster-scoped by definition,
# so no new AWS-side wiring is needed -- this is just a second consumer
# of a secret ESO already has access to.
#
# ASSUMPTION: your Bearer auth on /metrics does a literal string compare
# against this value. If it's HMAC-derived or short-lived, this whole
# approach is wrong and needs a different mechanism -- confirm against
# backend/src/middleware before applying.
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: prometheus-metrics-token
  namespace: monitoring
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: aws-secrets-manager
    kind: ClusterSecretStore
  target:
    name: prometheus-metrics-token
    creationPolicy: Owner
  data:
    - secretKey: token
      remoteRef:
        key: penwave/prod/app-secrets
        property: METRICS_SECRET
