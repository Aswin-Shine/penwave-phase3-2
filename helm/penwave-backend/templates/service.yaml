apiVersion: v1
kind: Service
metadata:
  name: penwave-backend
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "penwave-backend.labels" . | nindent 4 }}
spec:
  type: ClusterIP
  selector:
    app.kubernetes.io/name: penwave-backend
  ports:
    - name: http
      port: {{ .Values.service.port }}
      targetPort: {{ .Values.service.port }}
      protocol: TCP
