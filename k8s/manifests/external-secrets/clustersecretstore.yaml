# ─────────────────────────────────────────────────────────────────────────────
# ClusterSecretStore: aws-secrets-manager
#
# This is the connection definition — "how do I reach AWS Secrets Manager,
# and what identity do I use." It does NOT pull any actual secret yet;
# that's the ExternalSecret resource's job (external-secret.yaml).
#
# ClusterSecretStore (not namespaced SecretStore) because this same store
# could be referenced by ExternalSecrets in multiple namespaces later
# (e.g. if you add a staging namespace). If you only ever need one
# namespace, a namespaced SecretStore would also work — ClusterSecretStore
# is the better default for anything beyond a single-namespace toy setup.
#
# PREREQUISITE: this assumes the External Secrets Operator itself is
# already installed via Helm:
#   helm repo add external-secrets https://charts.external-secrets.io
#   helm install external-secrets external-secrets/external-secrets \
#     -n external-secrets --create-namespace
#
# The external-secrets ServiceAccount this creates by default needs the
# eks.amazonaws.com/role-arn annotation pointing at
# `terraform output external_secrets_irsa_role_arn` — ESO's Helm chart
# supports this directly via --set serviceAccount.annotations, or patch
# it after install. Without that annotation, ESO's own pod has no AWS
# credentials and every ExternalSecret sync will fail with AccessDenied.
# ─────────────────────────────────────────────────────────────────────────────
apiVersion: external-secrets.io/v1
kind: ClusterSecretStore
metadata:
  name: aws-secrets-manager
spec:
  provider:
    aws:
      service: SecretsManager
      region: us-east-1
      auth:
        # jwt auth = IRSA. ESO reads AWS credentials via the same
        # AssumeRoleWithWebIdentity mechanism described in
        # docs/irsa-deep-dive.md, using ITS OWN ServiceAccount
        # (external-secrets, in the external-secrets namespace) —
        # not the backend's ServiceAccount. Two separate IRSA roles,
        # two separate trust policies, each scoped to its own identity.
        jwt:
          serviceAccountRef:
            name: external-secrets
            namespace: external-secrets
