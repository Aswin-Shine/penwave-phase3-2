# ─────────────────────────────────────────────────────────────────────────────
# ExternalSecret: penwave-backend-secrets
#
# This is the piece that actually creates a Kubernetes Secret object,
# populated from the AWS Secrets Manager secret Terraform wrote
# (terraform/modules/irsa/main.tf — aws_secretsmanager_secret.app_secrets).
#
# refreshInterval: ESO polls Secrets Manager on this schedule and updates
# the K8s Secret if the source value changed. This means rotating a secret
# in AWS Secrets Manager (e.g. via the AWS console or a future Lambda
# rotation function) propagates to the cluster automatically within 1 hour
# — no kubectl, no redeploy, no manual Secret edit. The backend pods still
# need a restart to pick up the new value as an env var though (env vars
# are injected at container start, not live-reloaded) — that's a real
# limitation worth knowing, not a flaw in this manifest specifically.
#
# remoteRef.key MUST match the Secrets Manager secret name exactly:
# `terraform output secrets_manager_secret_name` — format is
# "penwave/prod/app-secrets" per modules/irsa/main.tf's naming.
#
# property: each entry pulls ONE key out of the single JSON blob Terraform
# wrote (JWT_ACCESS_SECRET, DB_PASSWORD, etc.) and maps it to a specific
# key in the resulting K8s Secret. This is what makes it possible to store
# everything as one Secrets Manager secret but still get individual env
# var names the backend's env.ts schema expects.
# ─────────────────────────────────────────────────────────────────────────────
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: penwave-backend-secrets
  namespace: penwave
spec:
  refreshInterval: 1h

  secretStoreRef:
    name: aws-secrets-manager
    kind: ClusterSecretStore

  target:
    name: penwave-backend-secrets # the K8s Secret this creates
    creationPolicy: Owner # ESO owns this Secret's lifecycle; deletes it if the ExternalSecret is deleted

  data:
    - secretKey: JWT_ACCESS_SECRET
      remoteRef:
        key: penwave/prod/app-secrets
        property: JWT_ACCESS_SECRET
    - secretKey: JWT_REFRESH_SECRET
      remoteRef:
        key: penwave/prod/app-secrets
        property: JWT_REFRESH_SECRET
    - secretKey: COOKIE_SECRET
      remoteRef:
        key: penwave/prod/app-secrets
        property: COOKIE_SECRET
    - secretKey: METRICS_SECRET
      remoteRef:
        key: penwave/prod/app-secrets
        property: METRICS_SECRET
    - secretKey: DB_PASSWORD
      remoteRef:
        key: penwave/prod/app-secrets
        property: DB_PASSWORD
    - secretKey: REDIS_AUTH_TOKEN
      remoteRef:
        key: penwave/prod/app-secrets
        property: REDIS_AUTH_TOKEN
