# ─────────────────────────────────────────────────────────────────────────────
# Secret: penwave-backend-connection-strings
#
# WHY THIS IS A SEPARATE, MANUALLY-APPLIED SECRET AND NOT PART OF THE
# ExternalSecret ABOVE:
#
# DATABASE_URL and REDIS_URL are not atomic secret values — they're
# connection strings ASSEMBLED from multiple pieces:
#   postgresql://<user>:<password>@<rds_endpoint>:5432/<db_name>
#   rediss://default:<auth_token>@<redis_endpoint>:6379
#
# The password/token pieces come from AWS Secrets Manager (good fit for
# ExternalSecret). The endpoint hostnames come from Terraform RDS/Redis
# module OUTPUTS, not from Secrets Manager — `terraform output rds_endpoint`
# and `terraform output redis_endpoint`. ESO's ExternalSecret resource can
# template multiple remote keys together (via templateFrom/template specs)
# but doing so here means hardcoding the RDS/Redis endpoint INTO the
# ExternalSecret manifest anyway — at which point you've gained nothing
# over just creating this Secret directly, and you've added a layer of
# ESO templating syntax that obscures rather than clarifies what's
# happening.
#
# PRAGMATIC CHOICE: create this one Secret manually (or via a small script
# in your deploy pipeline) using the actual Terraform output values. This
# is the ONE secret in this entire setup that isn't synced by ESO — and
# that's a deliberate, documented exception, not an inconsistency.
#
# DO NOT commit this file with real values filled in. Apply it with real
# values like this instead:
#
#   kubectl create secret generic penwave-backend-connection-strings \
#     -n penwave \
#     --from-literal=DATABASE_URL="postgresql://penwave:$(terraform output -raw db_password 2>/dev/null || echo REPLACE_ME)@$(cd terraform && terraform output -raw rds_endpoint):5432/penwave" \
#     --from-literal=REDIS_URL="rediss://default:<redis_auth_token>@$(cd terraform && terraform output -raw redis_endpoint):6379"
#
# Better yet: script this into a one-time post-apply step rather than
# typing it by hand — see docs/kubernetes.md "Connection string assembly"
# section for a copy-pasteable script version.
# ─────────────────────────────────────────────────────────────────────────────
apiVersion: v1
kind: Secret
metadata:
  name: penwave-backend-connection-strings
  namespace: penwave
type: Opaque
stringData:
  DATABASE_URL: "postgresql://penwave:REPLACE_WITH_DB_PASSWORD@REPLACE_WITH_RDS_ENDPOINT:5432/penwave"
  REDIS_URL: "rediss://default:REPLACE_WITH_REDIS_AUTH_TOKEN@REPLACE_WITH_REDIS_ENDPOINT:6379"
