# ─────────────────────────────────────────────────────────────────────────────
# ServiceAccount: penwave-backend
#
# THIS IS THE IRSA WIRE-UP. The annotation below is what makes EKS's Pod
# Identity webhook inject AWS_ROLE_ARN and AWS_WEB_IDENTITY_TOKEN_FILE into
# any pod using this ServiceAccount. Without this exact annotation, pods
# get no AWS credentials at all via IRSA — they'd silently fall back to
# whatever the underlying EC2 Auto Mode node's own role grants (see
# docs/irsa-deep-dive.md "Symptom: pod falls back to node-level
# permissions" for what that failure mode looks like in practice).
#
# CRITICAL: the role ARN below MUST be replaced with the actual output
# from `terraform output backend_irsa_role_arn` after applying the
# Terraform in the previous delivery. It is a placeholder here because
# it's account-specific and only exists after you've run terraform apply.
#
# CRITICAL: this ServiceAccount's name (penwave-backend) and the namespace
# (penwave) MUST exactly match backend_sa_name and backend_namespace in
# terraform/modules/irsa/variables.tf — those values are what's baked into
# the IAM role's trust policy Condition. A mismatch here means the trust
# policy's "sub" claim check fails and AssumeRoleWithWebIdentity returns
# AccessDenied, even though everything else looks correctly configured.
# ─────────────────────────────────────────────────────────────────────────────
apiVersion: v1
kind: ServiceAccount
metadata:
  name: penwave-backend
  namespace: penwave
  annotations:
    # REPLACE: output of `terraform output backend_irsa_role_arn`
    eks.amazonaws.com/role-arn: "arn:aws:iam::797416042676:role/penwave-irsa-backend-prod"
  labels:
    app.kubernetes.io/name: penwave-backend
    app.kubernetes.io/part-of: penwave
