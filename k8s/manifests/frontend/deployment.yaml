# ─────────────────────────────────────────────────────────────────────────────
# Deployment: penwave-frontend
#
# UPDATE: header below is STALE. Described problem (NEXT_PUBLIC_API_URL
# baked at build) is FIXED — src/app/api/[...path]/route.ts proxies
# server-side using BACKEND_URL, read at REQUEST time not build time.
# frontend-ci.yml no longer passes --build-arg. Original comment kept
# below for history, corrected here so it stops being misread as current.
#
# BACKEND_URL added below: in-cluster Service DNS, same namespace short
# form (penwave-backend:4000), not Docker Compose's `backend:4000` —
# different networking model, EC2 comment doesn't apply here.
# ─────────────────────────────────────────────────────────────────────────────
#
# ⚠️ ORIGINAL COMMENT (STALE, kept for history — see UPDATE above):
#
# frontend/Dockerfile bakes NEXT_PUBLIC_API_URL in at BUILD time via an ARG:
#   ARG NEXT_PUBLIC_API_URL=http://localhost/api
#   ENV NEXT_PUBLIC_API_URL=$NEXT_PUBLIC_API_URL
#   RUN npm run build
#
# Next.js inlines NEXT_PUBLIC_* vars into the client-side JS bundle at
# build time — they are NOT readable from the container's runtime
# environment by browser-side code, no matter what you set in this
# Deployment's `env:` block below. Setting NEXT_PUBLIC_API_URL here as a
# pod env var does nothing for already-built client bundles; it only
# affects Next.js server-side code paths (SSR, route handlers) that read
# process.env directly at request time.
# ─────────────────────────────────────────────────────────────────────────────
apiVersion: apps/v1
kind: Deployment
metadata:
  name: penwave-frontend
  namespace: penwave
  labels:
    app.kubernetes.io/name: penwave-frontend
    app.kubernetes.io/part-of: penwave
spec:
  replicas: 2
  selector:
    matchLabels:
      app.kubernetes.io/name: penwave-frontend
  template:
    metadata:
      labels:
        app.kubernetes.io/name: penwave-frontend
        app.kubernetes.io/part-of: penwave
    spec:
      serviceAccountName: penwave-frontend

      securityContext:
        runAsNonRoot: true
        runAsUser: 1001
        runAsGroup: 1001
        fsGroup: 1001
        seccompProfile:
          type: RuntimeDefault

      containers:
        - name: frontend
          image: "aswinshine/penwave-frontend:latest"
          imagePullPolicy: Always

          ports:
            - name: http
              containerPort: 3000
              protocol: TCP

          envFrom:
            - configMapRef:
                name: penwave-frontend-config

          env:
            # Server-side only, read at request time by
            # src/app/api/[...path]/route.ts. Same-namespace short DNS
            # form -- both penwave-frontend and penwave-backend live in
            # the penwave namespace.
            - name: BACKEND_URL
              value: "http://penwave-backend:4000/api"

          livenessProbe:
            httpGet:
              path: /
              port: 3000
            initialDelaySeconds: 15
            periodSeconds: 15
            timeoutSeconds: 5
            failureThreshold: 3

          readinessProbe:
            httpGet:
              path: /
              port: 3000
            initialDelaySeconds: 10
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 3

          resources:
            requests:
              cpu: 200m
              memory: 256Mi
            limits:
              cpu: 400m
              memory: 512Mi

          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop:
                - ALL

          volumeMounts:
            - name: tmp
              mountPath: /tmp
            - name: next-cache
              mountPath: /app/.next/cache

      volumes:
        - name: tmp
          emptyDir:
            sizeLimit: 64Mi
        - name: next-cache
          emptyDir:
            sizeLimit: 128Mi

      terminationGracePeriodSeconds: 15