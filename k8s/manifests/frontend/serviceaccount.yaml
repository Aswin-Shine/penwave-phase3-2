# ─────────────────────────────────────────────────────────────────────────────
# ServiceAccount: penwave-frontend
#
# No IRSA annotation — the frontend never calls AWS APIs directly. It only
# talks to the backend over HTTP (internal ClusterIP service) and serves
# pages to browsers. Giving it an IAM role it doesn't need would violate
# least-privilege for no benefit — exactly the kind of "just in case"
# permission grant that turns into an attack surface later.
# ─────────────────────────────────────────────────────────────────────────────
apiVersion: v1
kind: ServiceAccount
metadata:
  name: penwave-frontend
  namespace: penwave
  labels:
    app.kubernetes.io/name: penwave-frontend
    app.kubernetes.io/part-of: penwave
